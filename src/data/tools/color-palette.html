<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #121212;
    font-family: 'SF Mono', 'Fira Code', monospace;
    padding: 32px 24px;
  }

  .palette-group {
    margin-bottom: 40px;
  }

  .group-label {
    color: #4a5568;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .swatches {
    display: grid;
    grid-template-columns: repeat(11, 1fr);
    gap: 4px;
  }

  .swatch {
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .swatch:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    z-index: 2;
  }

  .swatch:active {
    transform: scale(0.96);
  }

  .color-block {
    height: 60px;
    width: 100%;
  }

  .swatch-info {
    background: #121212;
    padding: 5px 6px;
  }

  .shade-name {
    color: #8b95a8;
    font-size: 9px;
    display: block;
    margin-bottom: 2px;
  }

  .hex-code {
    color: #cdd5e0;
    font-size: 9px;
    display: block;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #121212;
    border: 1px solid #2d3650;
    color: #9baec8;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div style="margin-bottom:16px;display:flex;gap:8px;align-items:center">
  <button onclick="sendToCanvas()" style="background:#c8ff00;border:none;border-radius:6px;padding:8px 16px;color:#000;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit">⬡ Send to Canvas</button>
  <span style="color:#4a5568;font-size:11px;font-family:'SF Mono','Fira Code',monospace">All color palettes will be sent</span>
</div>
<div id="app"></div>
<div class="toast" id="toast"></div>

const shades = [50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 950];

function getLuminance(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  return 0.299 * r + 0.587 * g + 0.114 * b;
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function showToast(hex) {
  const toast = document.getElementById('toast');
  toast.textContent = hex + ' copied';
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 1500);
}

function sendColorToCanvas(hex, paletteName, shade) {
  const html = `<div style="width:100%;height:100px;background:${hex};border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:13px;font-weight:600;color:${getLuminance(hex) > 0.5 ? '#000' : '#fff'}">${hex}</div>`;
  const css = `body { margin: 0; background: #121212; font-family: 'SF Mono', monospace; }`;
  parent.postMessage({ type: 'tool-output', toolName: 'Color Palette', name: `${paletteName}-${shade}`, html, css }, '*');
  showToast('Sent to Canvas!');
}

function sendToCanvas() {
  let paletteSwatches = '';
  for (const [name, shadeMap] of Object.entries(palettes)) {
    paletteSwatches += `<div style="margin-bottom:24px"><div style="color:#4a5568;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;padding-left:2px">${name}</div><div style="display:grid;grid-template-columns:repeat(11,1fr);gap:3px">`;
    for (const shade of shades) {
      const hex = shadeMap[shade];
      paletteSwatches += `<div style="background:${hex};height:40px;border-radius:4px;border:1px solid rgba(255,255,255,0.05)"></div>`;
    }
    paletteSwatches += `</div></div>`;
  }
  const html = `<div style="padding:16px">${paletteSwatches}</div>`;
  const css = `body { margin: 0; background: #121212; font-family: 'SF Mono', 'Fira Code', monospace; }`;
  parent.postMessage({ type: 'tool-output', toolName: 'Color Palette', name: 'Color Palettes', html, css }, '*');
  showToast('Palette sent to Canvas!');
}

const app = document.getElementById('app');

for (const [name, shadeMap] of Object.entries(palettes)) {
  const group = document.createElement('div');
  group.className = 'palette-group';

  const label = document.createElement('div');
  label.className = 'group-label';
  label.textContent = name;
  group.appendChild(label);

  const grid = document.createElement('div');
  grid.className = 'swatches';

  for (const shade of shades) {
    const hex = shadeMap[shade];
    const swatch = document.createElement('div');
    swatch.className = 'swatch';
    swatch.title = `${name}-${shade} ${hex}`;

    const block = document.createElement('div');
    block.className = 'color-block';
    block.style.background = hex;

    const info = document.createElement('div');
    info.className = 'swatch-info';

    const shadeName = document.createElement('span');
    shadeName.className = 'shade-name';
    shadeName.textContent = shade;

    const hexCode = document.createElement('span');
    hexCode.className = 'hex-code';
    hexCode.textContent = hex;

    info.appendChild(shadeName);
    info.appendChild(hexCode);
    swatch.appendChild(block);
    swatch.appendChild(info);

    swatch.addEventListener('click', (e) => {
      e.stopPropagation();
      sendColorToCanvas(hex, name, shade);
    });

    grid.appendChild(swatch);
  }

  group.appendChild(grid);
  app.appendChild(group);
}
</script>
