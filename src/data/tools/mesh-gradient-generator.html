<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesh Gradient Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #121212;
    --surface: #121212;
    --surface2: #121212;
    --border: #2a3050;
    --text: #c8d0e8;
    --text-dim: #6b7599;
    --accent: #c8ff00;
    --accent-dark: #9fcc00;
    --radius: 8px;
    --radius-sm: 5px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #e8edf8;
    letter-spacing: -0.02em;
  }
  .header-btns { display: flex; gap: 8px; }
  .btn {
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: #263060; border-color: #3a4570; }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f1a;
    font-weight: 700;
  }
  .btn-accent:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr 260px;
    flex: 1;
    overflow: hidden;
  }

  /* ── Panels ── */
  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }
  .panel:last-child { border-right: none; border-left: 1px solid var(--border); }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ── Color Controls ── */
  .color-actions {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .color-actions .btn { flex: 1; justify-content: center; }
  .btn-yellow {
    background: var(--accent); border-color: var(--accent); color: #0d0f1a; font-weight: 700;
  }
  .btn-yellow:hover { background: var(--accent-dark); }

  .color-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .color-card.active { border-color: var(--accent); }

  .color-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .color-card-label { font-weight: 600; font-size: 12px; color: #e8edf8; }
  .remove-btn {
    width: 18px; height: 18px; border-radius: 50%;
    background: #2a3050; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 12px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .remove-btn:hover { background: #c0392b; color: #fff; }

  .color-input-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .color-swatch {
    width: 32px; height: 32px; border-radius: 5px;
    border: 1px solid var(--border); cursor: pointer;
    flex-shrink: 0; overflow: hidden; position: relative;
  }
  .color-swatch input[type="color"] {
    opacity: 0; position: absolute; inset: 0; width: 100%; height: 100%; cursor: pointer;
  }
  .hex-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'SF Mono', monospace; font-size: 12px;
    padding: 6px 8px; outline: none;
    transition: border-color 0.15s;
  }
  .hex-input:focus { border-color: var(--accent); }

  .slider-group { margin-bottom: 6px; }
  .slider-label {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text-dim); margin-bottom: 4px;
  }
  .slider-label span:last-child { color: var(--text); font-weight: 500; }
  input[type="range"] {
    width: 100%; height: 4px; -webkit-appearance: none;
    background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent);
    border: 2px solid #0d0f1a; cursor: pointer;
  }

  .add-color-btn {
    width: 100%; padding: 9px; margin-top: 4px;
    background: transparent; border: 1px dashed var(--border);
    border-radius: var(--radius); color: var(--text-dim);
    font-size: 12px; cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .add-color-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Canvas ── */
  .canvas-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #121212;
    padding: 24px;
    gap: 12px;
    overflow: hidden;
  }

  .preview-wrap {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    flex: 1;
    width: 100%;
    max-width: 700px;
    max-height: 420px;
  }

  #preview {
    width: 100%;
    height: 100%;
    display: block;
    min-height: 320px;
  }

  /* Draggable dots */
  .dot {
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.15);
    cursor: grab;
    transform: translate(-50%, -50%);
    transition: box-shadow 0.15s;
    z-index: 10;
  }
  .dot:hover, .dot.dragging { box-shadow: 0 0 0 4px rgba(255,255,255,0.25); cursor: grabbing; }
  .dot.active { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(200,255,0,0.3); }

  .css-output {
    width: 100%;
    max-width: 700px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    color: #8899cc;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 140px;
    overflow-y: auto;
  }

  /* ── Right Panel ── */
  .right-panel {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
  }

  .field-label {
    font-size: 11px; font-weight: 600;
    color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.07em; margin-bottom: 8px;
  }

  .bg-color-row {
    display: flex; align-items: center; gap: 8px;
  }
  .bg-swatch {
    width: 32px; height: 32px; border-radius: 5px;
    border: 1px solid var(--border); overflow: hidden; position: relative; cursor: pointer;
  }
  .bg-swatch input[type="color"] {
    opacity: 0; position: absolute; inset: 0; width: 100%; height: 100%;
  }

  .blur-row { display: flex; align-items: center; gap: 10px; }
  .blur-val { font-size: 12px; font-weight: 600; min-width: 40px; text-align: right; }

  .blend-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 12px;
    padding: 7px 10px; outline: none; cursor: pointer;
  }

  .noise-row {
    display: flex; align-items: center; gap: 10px;
  }
  .noise-row label { font-size: 13px; cursor: pointer; }
  input[type="checkbox"] {
    width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent);
  }

  .export-btn {
    width: 100%; padding: 10px; border-radius: var(--radius-sm);
    border: none; font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s;
  }
  .export-btn:hover { opacity: 0.85; }
  .export-primary { background: var(--accent); color: #0d0f1a; }
  .export-secondary {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-weight: 500;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Mesh Gradient Generator</h1>
  <div class="header-btns">
    <button class="btn" onclick="copyCSS()">⬡ CSS</button>
    <button class="btn-accent btn" onclick="sendToCanvas()">⬡ Send to Canvas</button>
  </div>
</header>

<div class="layout">

  <!-- LEFT: Color Controls -->
  <div class="panel" id="colorPanel">
    <div class="panel-title">Colors (<span id="colorCount">4</span>)</div>
    <div class="color-actions">
      <button class="btn btn-yellow" onclick="randomize()">⟳ Randomize</button>
      <button class="btn" onclick="shuffle()">⇄ Shuffle</button>
    </div>
    <div id="colorList"></div>
    <button class="add-color-btn" onclick="addColor()">+ Add Color</button>
  </div>

  <!-- CENTER: Preview -->
  <div class="canvas-area">
    <div class="preview-wrap" id="previewWrap">
      <div id="preview"></div>
      <!-- dots injected by JS -->
    </div>
    <div class="css-output" id="cssOutput"></div>
  </div>

  <!-- RIGHT: Settings -->
  <div class="right-panel">
    <div>
      <div class="field-label">Background Color</div>
      <div class="bg-color-row">
        <div class="bg-swatch" id="bgSwatch">
          <input type="color" id="bgColorPicker" value="#0f0f14" oninput="onBgChange(this.value)">
        </div>
        <input class="hex-input" id="bgHexInput" value="#0f0f14" maxlength="7"
          oninput="onBgHex(this.value)" style="flex:1">
      </div>
    </div>

    <div>
      <div class="field-label">Blur: <span id="blurLabel">60px</span></div>
      <input type="range" min="0" max="200" value="60" id="blurSlider" oninput="onBlur(this.value)">
    </div>

    <div>
      <div class="field-label">Blend Mode</div>
      <select class="blend-select" id="blendSelect" onchange="render()">
        <option>normal</option>
        <option>multiply</option>
        <option>screen</option>
        <option>overlay</option>
        <option>soft-light</option>
        <option>hard-light</option>
        <option>color-dodge</option>
        <option>color-burn</option>
        <option>darken</option>
        <option>lighten</option>
        <option>difference</option>
        <option>exclusion</option>
        <option>hue</option>
        <option>saturation</option>
        <option>color</option>
        <option>luminosity</option>
      </select>
    </div>

    <div>
      <div class="noise-row">
        <input type="checkbox" id="noiseCheck" onchange="render()">
        <label for="noiseCheck">Add Noise</label>
      </div>
    </div>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
      <button class="export-btn export-primary" onclick="sendToCanvas()">⬡ Send to Canvas</button>
      <button class="export-btn export-secondary" onclick="copyCSS()">Copy CSS</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#121212;border:1px solid #3a4570;color:#c8d0e8;font-size:12px;padding:8px 16px;
  border-radius:6px;opacity:0;transition:all 0.2s;pointer-events:none;font-family:monospace;
  white-space:nowrap;z-index:999;"></div>

<script>
// ── State ──────────────────────────────────────────────
let colors = [
  { hex: '#667eea', x: 20, y: 30 },
  { hex: '#764ba2', x: 80, y: 70 },
  { hex: '#f093fb', x: 64, y: 37 },
  { hex: '#4facfe', x: 30, y: 80 },
];
let bgColor = '#0f0f14';
let blur = 60;
let activeIdx = null;

// ── Render ─────────────────────────────────────────────
function getCSS(forExport = false) {
  const size = forExport ? '50%' : '50%';
  const gradients = colors.map(c =>
    `radial-gradient(circle at ${c.x}% ${c.y}%, ${c.hex}, transparent ${size})`
  ).join(',\n    ');
  const blend = document.getElementById('blendSelect').value;
  const noise = document.getElementById('noiseCheck').checked;
  const noiseCSS = noise ? `\n  background-blend-mode: ${blend};` : '';
  return `.mesh-gradient {\n  background-color: ${bgColor};\n  background-image:\n    ${gradients};\n  filter: blur(${blur}px);${noiseCSS}\n}`;
}

function render() {
  const gradients = colors.map(c =>
    `radial-gradient(circle at ${c.x}% ${c.y}%, ${c.hex}, transparent 50%)`
  ).join(', ');
  const blend = document.getElementById('blendSelect').value;
  const noise = document.getElementById('noiseCheck').checked;
  const preview = document.getElementById('preview');
  preview.style.backgroundColor = bgColor;
  preview.style.backgroundImage = gradients;
  preview.style.filter = `blur(${blur}px)`;
  preview.style.backgroundBlendMode = noise ? blend : 'normal';
  document.getElementById('cssOutput').textContent = getCSS();
  buildColorCards();
  updateDots();
}

// ── Color Cards ────────────────────────────────────────
function buildColorCards() {
  const list = document.getElementById('colorList');
  list.innerHTML = '';
  document.getElementById('colorCount').textContent = colors.length;

  colors.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'color-card' + (i === activeIdx ? ' active' : '');
    card.onclick = () => { activeIdx = i; render(); };

    card.innerHTML = `
      <div class="color-card-header">
        <span class="color-card-label">Color ${i + 1}</span>
        <button class="remove-btn" onclick="event.stopPropagation(); removeColor(${i})">×</button>
      </div>
      <div class="color-input-row">
        <div class="color-swatch" style="background:${c.hex}">
          <input type="color" value="${c.hex}" oninput="onColorPick(${i}, this.value)">
        </div>
        <input class="hex-input" value="${c.hex}" maxlength="7"
          oninput="onHexInput(${i}, this.value)" onclick="event.stopPropagation()">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>X</span><span>${c.x}%</span></div>
        <input type="range" min="0" max="100" value="${c.x}"
          oninput="event.stopPropagation(); onPos(${i}, 'x', this.value)">
      </div>
      <div class="slider-group">
        <div class="slider-label"><span>Y</span><span>${c.y}%</span></div>
        <input type="range" min="0" max="100" value="${c.y}"
          oninput="event.stopPropagation(); onPos(${i}, 'y', this.value)">
      </div>
    `;
    list.appendChild(card);
  });
}

function onColorPick(i, val) {
  colors[i].hex = val;
  render();
}

function onHexInput(i, val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    colors[i].hex = val;
    render();
  }
}

function onPos(i, axis, val) {
  colors[i][axis] = parseInt(val);
  render();
}

function removeColor(i) {
  if (colors.length <= 1) return;
  colors.splice(i, 1);
  if (activeIdx >= colors.length) activeIdx = colors.length - 1;
  render();
}

function addColor() {
  colors.push({
    hex: randomHex(),
    x: Math.floor(Math.random() * 80 + 10),
    y: Math.floor(Math.random() * 80 + 10)
  });
  render();
}

// ── Draggable Dots ─────────────────────────────────────
function updateDots() {
  const wrap = document.getElementById('previewWrap');
  // Remove old dots
  wrap.querySelectorAll('.dot').forEach(d => d.remove());

  colors.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === activeIdx ? ' active' : '');
    dot.style.left = c.x + '%';
    dot.style.top = c.y + '%';
    dot.style.borderColor = i === activeIdx ? '#c8ff00' : 'rgba(255,255,255,0.8)';

    let dragging = false, startX, startY, startPX, startPY;

    dot.addEventListener('mousedown', e => {
      e.preventDefault();
      dragging = true;
      activeIdx = i;
      dot.classList.add('dragging');
      startX = e.clientX; startY = e.clientY;
      startPX = c.x; startPY = c.y;
      render();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const rect = wrap.getBoundingClientRect();
      const dx = ((e.clientX - startX) / rect.width) * 100;
      const dy = ((e.clientY - startY) / rect.height) * 100;
      colors[i].x = Math.max(0, Math.min(100, Math.round(startPX + dx)));
      colors[i].y = Math.max(0, Math.min(100, Math.round(startPY + dy)));
      render();
    });

    document.addEventListener('mouseup', () => {
      if (dragging) { dragging = false; dot.classList.remove('dragging'); }
    });

    wrap.appendChild(dot);
  });
}

// ── Background ─────────────────────────────────────────
function onBgChange(val) {
  bgColor = val;
  document.getElementById('bgHexInput').value = val;
  document.getElementById('bgSwatch').style.background = val;
  render();
}

function onBgHex(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    bgColor = val;
    document.getElementById('bgColorPicker').value = val;
    document.getElementById('bgSwatch').style.background = val;
    render();
  }
}

// ── Blur ───────────────────────────────────────────────
function onBlur(val) {
  blur = parseInt(val);
  document.getElementById('blurLabel').textContent = val + 'px';
  render();
}

// ── Randomize / Shuffle ────────────────────────────────
function randomHex() {
  return '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
}

function randomize() {
  colors = colors.map(() => ({
    hex: randomHex(),
    x: Math.floor(Math.random() * 80 + 10),
    y: Math.floor(Math.random() * 80 + 10)
  }));
  render();
}

function shuffle() {
  colors.forEach(c => {
    c.x = Math.floor(Math.random() * 80 + 10);
    c.y = Math.floor(Math.random() * 80 + 10);
  });
  render();
}

// ── Copy CSS ───────────────────────────────────────────
function copyCSS() {
  navigator.clipboard.writeText(getCSS()).catch(() => {});
  showToast('CSS copied!');
}

// ── Export HTML ────────────────────────────────────────
function sendToCanvas() {
  const gradients = colors.map(c =>
    `radial-gradient(circle at ${c.x}% ${c.y}%, ${c.hex}, transparent 50%)`
  ).join(',\n    ');
  const blend = document.getElementById('blendSelect').value;
  const noise = document.getElementById('noiseCheck').checked;
  const noiseCSS = noise ? `\n  background-blend-mode: ${blend};` : '';

  const html = `<div class="mesh-gradient"></div>`;
  const css = `.mesh-gradient {
  width: 100%;
  height: 300px;
  border-radius: 12px;
  background-color: ${bgColor};
  background-image:
    ${gradients};
  filter: blur(${blur}px);${noiseCSS}
}`;

  parent.postMessage({ type: 'tool-output', toolName: 'Mesh Gradient', name: 'Mesh Gradient', html, css }, '*');
  showToast('Sent to Canvas!');
}

// ── Toast ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(20px)';
  }, 1800);
}

// ── Init ───────────────────────────────────────────────
document.getElementById('bgSwatch').style.background = bgColor;
render();
</script>
</body>
</html>
