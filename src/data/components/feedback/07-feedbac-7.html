<style>.wrap{display:flex;flex-direction:column;gap:6px;padding:8px;font-family:system-ui,sans-serif}.tt{position:relative;padding:6px 10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;font-size:10px;color:#888;display:inline-block;margin-right:4px}.tt::after{content:"Tooltip text";position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);padding:4px 8px;background:#111;border:1px solid #333;border-radius:4px;font-size:8px;color:#ccc;white-space:nowrap;opacity:0;transition:opacity .15s}.tt:hover::after{opacity:1}.tt2{position:relative;padding:6px 10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;font-size:10px;color:#888;display:inline-block;margin-right:4px}.tt2::after{content:"Rich content";position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);padding:4px 8px;background:#111;border:1px solid #00c8ff;border-radius:4px;font-size:8px;color:#74c0fc;white-space:nowrap;opacity:0;transition:opacity .15s}.tt2:hover::after{opacity:1}</style>
<div class="wrap"><div><span class="tt">Hover top</span><span class="tt2">Hover bottom</span></div></div>
